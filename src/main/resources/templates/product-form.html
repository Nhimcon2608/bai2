<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle + ' - Product Hub'}">Sản phẩm - Product Hub</title>
    <link rel="stylesheet" th:href="@{/css/library.css}" href="/css/library.css">
</head>
<body>
<main class="page">
    <section class="glass-panel form-panel">
        <h2 th:text="${formTitle}">Thêm sản phẩm</h2>
        <p class="subtitle">Thiết lập thông tin sản phẩm, danh mục và trạng thái kinh doanh.</p>

        <form class="form-grid" th:action="${formAction}" method="post" th:object="${product}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="grid-2">
                <div>
                    <label for="sku">SKU</label>
                    <input type="text" id="sku" th:field="*{sku}" placeholder="Ví dụ: IP15-128-BLK">
                    <p class="field-error" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></p>
                </div>
                <div>
                    <label for="name">Tên sản phẩm</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="Ví dụ: iPhone 15 128GB">
                    <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>
            </div>

            <div>
                <label for="categoryId">Danh mục</label>
                <select id="categoryId" name="categoryId">
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}">
                    </option>
                </select>
                <p class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
            </div>

            <div>
                <label for="description">Mô tả</label>
                <textarea id="description" th:field="*{description}" rows="4"
                          placeholder="Thông tin nổi bật, cấu hình, ghi chú..."></textarea>
                <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
            </div>

            <div class="check-line">
                <input type="checkbox" id="active" th:field="*{active}">
                <label for="active">Sản phẩm đang hoạt động</label>
            </div>

            <div class="actions">
                <button class="btn" type="submit" th:text="${submitLabel}">Lưu</button>
                <a class="btn btn-light" th:href="@{/products}">Quay lại</a>
                <a class="btn btn-secondary" th:href="@{/}">Dashboard</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
