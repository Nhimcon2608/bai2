<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Product Hub</title>
    <link rel="stylesheet" th:href="@{/css/library.css}" href="/css/library.css">
</head>
<body class="auth-body">
<main class="auth-wrap">
    <section class="glass-panel auth-card">
        <span class="badge">Spring Security</span>
        <h1>Đăng nhập Product Hub</h1>
        <p class="subtitle">Truy cập hệ thống quản lý sản phẩm, danh mục và bảng giá.</p>

        <div class="flash error" th:if="${param.error}">Sai tài khoản hoặc mật khẩu.</div>
        <div class="flash success" th:if="${param.logout}">Bạn đã đăng xuất thành công.</div>

        <form class="form-grid" th:action="@{/login}" method="post">
            <div>
                <label for="username">Tài khoản</label>
                <input id="username" type="text" name="username" placeholder="Nhập tài khoản" required autofocus>
            </div>
            <div>
                <label for="password">Mật khẩu</label>
                <input id="password" type="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button class="btn" type="submit">Đăng nhập</button>
        </form>
    </section>
</main>
</body>
</html>
