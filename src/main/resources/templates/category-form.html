<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle + ' - Product Hub'}">Danh mục - Product Hub</title>
    <link rel="stylesheet" th:href="@{/css/library.css}" href="/css/library.css">
</head>
<body>
<main class="page">
    <section class="glass-panel form-panel">
        <h2 th:text="${formTitle}">Thêm danh mục</h2>
        <p class="subtitle">Điền thông tin cơ bản để tổ chức dữ liệu sản phẩm.</p>

        <form class="form-grid" th:action="${formAction}" method="post" th:object="${category}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div>
                <label for="name">Tên danh mục</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Ví dụ: Gia dụng">
                <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div>
                <label for="description">Mô tả</label>
                <textarea id="description" th:field="*{description}" rows="4"
                          placeholder="Mô tả ngắn về nhóm sản phẩm"></textarea>
                <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
            </div>

            <div class="actions">
                <button class="btn" type="submit" th:text="${submitLabel}">Lưu</button>
                <a class="btn btn-light" th:href="@{/categories}">Quay lại</a>
                <a class="btn btn-secondary" th:href="@{/}">Dashboard</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
