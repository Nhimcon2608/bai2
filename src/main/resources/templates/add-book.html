<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm sách mới - Thư viện sách</title>
    <link rel="stylesheet" th:href="@{/css/library.css}" href="/css/library.css">
</head>
<body>
    <main class="page">
        <section class="card form-card">
            <h1>Thêm sách mới</h1>
            <p class="subtitle">Nhập thông tin để thêm sách vào thư viện.</p>

            <form class="form-grid" th:action="@{/books/add}" action="/books/add" method="post" th:object="${book}">
                <div>
                    <label for="title">Tiêu đề</label>
                    <input type="text" id="title" th:field="*{title}" placeholder="Ví dụ: Dế mèn phiêu lưu ký" required>
                </div>
                <div>
                    <label for="author">Tác giả</label>
                    <input type="text" id="author" th:field="*{author}" placeholder="Ví dụ: Tô Hoài" required>
                </div>
                <div class="actions">
                    <button class="btn" type="submit">Lưu sách</button>
                    <a class="btn btn-light" th:href="@{/books}" href="/books">Quay lại danh sách</a>
                    <a class="btn btn-secondary" th:href="@{/}" href="/">Trang chủ</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
